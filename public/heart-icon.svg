<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Pink heart -->
  <path d="M256 448 C128 336, 32 240, 32 160 C32 80, 80 32, 144 32 C192 32, 232 64, 256 96 C280 64, 320 32, 368 32 C432 32, 480 80, 480 160 C480 240, 384 336, 256 448Z" fill="#ec407a"/>
  <path d="M256 448 C128 336, 32 240, 32 160 C32 80, 80 32, 144 32 C192 32, 232 64, 256 96 C280 64, 320 32, 368 32 C432 32, 480 80, 480 160 C480 240, 384 336, 256 448Z" fill="url(#heartGrad)"/>
  <!-- Heart highlight -->
  <path d="M144 64 C104 64, 64 100, 64 160 C64 180, 72 204, 88 228" stroke="rgba(255,255,255,0.4)" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Sparkle top-right -->
  <g transform="translate(420, 60)">
    <path d="M0,-28 L5,-5 L28,0 L5,5 L0,28 L-5,5 L-28,0 L-5,-5 Z" fill="#ffe4a0"/>
  </g>
  <!-- Sparkle top-left -->
  <g transform="translate(72, 80)">
    <path d="M0,-20 L3.5,-3.5 L20,0 L3.5,3.5 L0,20 L-3.5,3.5 L-20,0 L-3.5,-3.5 Z" fill="#ffe4a0"/>
  </g>
  <!-- Sparkle bottom-right -->
  <g transform="translate(460, 220)">
    <path d="M0,-18 L3,-3 L18,0 L3,3 L0,18 L-3,3 L-18,0 L-3,-3 Z" fill="#ffe4a0"/>
  </g>
  <!-- Sparkle small top -->
  <g transform="translate(300, 20)">
    <path d="M0,-14 L2.5,-2.5 L14,0 L2.5,2.5 L0,14 L-2.5,2.5 L-14,0 L-2.5,-2.5 Z" fill="#ffc0e0"/>
  </g>
  <defs>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f06292" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d81b60" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
